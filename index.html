<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expo Lead Pro | Pressline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
        }

        .input-active:focus-within {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        input, textarea, select {
            font-size: 16px !important; /* Prevents iOS zoom */
        }

        .loader-ring {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 pb-8">

    <!-- Header Section -->
    <header class="w-full max-w-md flex justify-between items-center mb-8 pt-4">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i data-lucide="zap" class="w-5 h-5"></i>
            </div>
            <h1 class="font-bold text-xl tracking-tight text-slate-800">Expo Lead Pro<span class="text-blue-600">.</span></h1>
        </div>
        <div class="flex items-center gap-1.5 px-3 py-1 bg-blue-50 text-blue-700 rounded-full text-[10px] font-bold uppercase tracking-wider border border-blue-100">
            <span id="globalCounter">0</span> Leads
        </div>
    </header>

    <main class="w-full max-w-md flex-grow">
        <!-- Lead Form -->
        <form id="leadForm" class="space-y-4">
            
            <!-- Business Card Snap -->
            <div class="relative group">
                <input type="file" id="cardInput" accept="image/*" capture="environment" class="hidden">
                <label for="cardInput" id="cardLabel" class="glass-panel p-5 rounded-3xl flex flex-col items-center justify-center gap-2 cursor-pointer active:scale-95 transition-all border-dashed border-2 border-slate-300 hover:bg-slate-50">
                    <div id="cardIcon" class="w-12 h-12 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-lg">
                        <i data-lucide="camera" class="w-6 h-6"></i>
                    </div>
                    <div class="text-center">
                        <p id="cardText" class="font-bold text-slate-700 text-sm">Snap Business Card</p>
                        <p class="text-[10px] text-slate-400 uppercase font-medium">Optional • Saves to Drive</p>
                    </div>
                </label>
            </div>

            <!-- Main Fields -->
            <div class="glass-panel p-5 rounded-3xl space-y-4 shadow-sm">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Full Name *</label>
                    <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all input-active">
                        <span class="pl-4 text-slate-400"><i data-lucide="user" class="w-4 h-4"></i></span>
                        <input type="text" name="name" required placeholder="Prospect Name" 
                            class="w-full px-3 py-4 outline-none text-slate-800 placeholder:text-slate-300 bg-transparent">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Company *</label>
                    <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all input-active">
                        <span class="pl-4 text-slate-400"><i data-lucide="building-2" class="w-4 h-4"></i></span>
                        <input type="text" name="company" required placeholder="Organization Name" 
                            class="w-full px-3 py-4 outline-none text-slate-800 placeholder:text-slate-300 bg-transparent">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Email</label>
                        <div class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all input-active">
                            <input type="email" name="email" placeholder="Optional" 
                                class="w-full px-4 py-4 outline-none text-slate-800 placeholder:text-slate-300 bg-transparent">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Phone</label>
                        <div class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all input-active">
                            <input type="tel" name="phone" placeholder="Optional" 
                                class="w-full px-4 py-4 outline-none text-slate-800 placeholder:text-slate-300 bg-transparent">
                        </div>
                    </div>
                </div>

                <hr class="border-slate-100">

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1 text-center">Lead Interest</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="temp" value="Cold" class="peer sr-only">
                            <div class="flex flex-col items-center p-3 rounded-xl border border-slate-200 bg-white text-slate-400 peer-checked:border-blue-500 peer-checked:text-blue-600 peer-checked:bg-blue-50 transition-all">
                                <span class="text-[10px] font-bold uppercase">Cold</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="temp" value="Warm" class="peer sr-only" checked>
                            <div class="flex flex-col items-center p-3 rounded-xl border border-slate-200 bg-white text-slate-400 peer-checked:border-orange-500 peer-checked:text-orange-600 peer-checked:bg-orange-50 transition-all">
                                <span class="text-[10px] font-bold uppercase">Warm</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="temp" value="Hot" class="peer sr-only">
                            <div class="flex flex-col items-center p-3 rounded-xl border border-slate-200 bg-white text-slate-400 peer-checked:border-red-500 peer-checked:text-red-600 peer-checked:bg-red-50 transition-all">
                                <span class="text-[10px] font-bold uppercase">Hot 🔥</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Remarks / Follow-up *</label>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all input-active">
                        <textarea name="notes" required rows="3" placeholder="What did you discuss? What are the next steps?" 
                            class="w-full px-4 py-3 outline-none text-slate-800 placeholder:text-slate-300 bg-transparent resize-none"></textarea>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" 
                class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl shadow-slate-200 hover:bg-slate-800 active:scale-[0.98] transition-all disabled:opacity-70">
                <span id="btnText">Capture & Sync Lead</span>
                <div id="btnIconContainer">
                    <i data-lucide="arrow-right" id="btnIcon" class="w-5 h-5"></i>
                </div>
            </button>
        </form>

        <!-- Success Screen -->
        <div id="successState" class="hidden flex flex-col items-center text-center space-y-8 py-12">
            <div class="w-24 h-24 bg-green-500 text-white rounded-full flex items-center justify-center shadow-2xl shadow-green-100">
                <i data-lucide="check" class="w-12 h-12"></i>
            </div>
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900">Lead Saved!</h2>
                <p class="text-slate-500 mt-2 px-6">Data appended to Spreadsheet and Card synced to Folder.</p>
            </div>
            <button onclick="resetApp()" class="w-full py-5 bg-white border-2 border-slate-900 text-slate-900 rounded-2xl font-bold hover:bg-slate-50 transition-all active:scale-[0.98]">
                Ready for Next Prospect →
            </button>
        </div>
    </main>

    <!-- Branding Footer -->
    <footer class="w-full max-w-md mt-12 pt-8 border-t border-slate-100 text-center">
        <h2 class="text-xl font-black text-slate-900 tracking-tighter uppercase mb-1">Pressline</h2>
        <div class="flex items-center justify-center gap-2 text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">
            <span>Designed for Ease</span>
            <span class="w-1 h-1 bg-slate-200 rounded-full"></span>
            <span>By Grow Bharat Technologies</span>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // Constants
        const SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_URL/exec'; 
        
        const form = document.getElementById('leadForm');
        const successState = document.getElementById('successState');
        const submitBtn = document.getElementById('submitBtn');
        const cardInput = document.getElementById('cardInput');
        const cardText = document.getElementById('cardText');
        const cardIcon = document.getElementById('cardIcon');
        const globalCounter = document.getElementById('globalCounter');

        let leadsToday = parseInt(localStorage.getItem('lead_count_pressline') || '0');
        globalCounter.innerText = leadsToday;

        // Card Selection UI Update
        cardInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                cardText.innerText = "Card Ready!";
                cardText.classList.add('text-green-600');
                cardIcon.className = "w-12 h-12 bg-green-600 text-white rounded-full flex items-center justify-center shadow-lg";
                cardIcon.innerHTML = `<i data-lucide="check" class="w-6 h-6"></i>`;
                lucide.createIcons();
            }
        });

        // Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Set Loading State
            submitBtn.disabled = true;
            document.getElementById('btnText').innerText = "Syncing Data...";
            document.getElementById('btnIconContainer').innerHTML = `<div class="loader-ring"></div>`;

            const formData = new FormData(form);
            const leadData = Object.fromEntries(formData.entries());
            
            let base64Image = "";
            if (cardInput.files[0]) {
                base64Image = await toBase64(cardInput.files[0]);
            }

            const payload = {
                ...leadData,
                image: base64Image,
                fileName: cardInput.files[0]?.name || "",
                timestamp: new Date().toLocaleString()
            };

            try {
                // To connect real data, uncomment this fetch block:
                /*
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                */

                // Simulated Delay for UX
                setTimeout(() => {
                    leadsToday++;
                    localStorage.setItem('lead_count_pressline', leadsToday);
                    globalCounter.innerText = leadsToday;
                    
                    form.classList.add('hidden');
                    successState.classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 1200);

            } catch (err) {
                alert("Sync failed. Check connection.");
                resetApp();
            }
        });

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        function resetApp() {
            form.reset();
            form.classList.remove('hidden');
            successState.classList.add('hidden');
            
            // Reset Button
            submitBtn.disabled = false;
            document.getElementById('btnText').innerText = "Capture & Sync Lead";
            document.getElementById('btnIconContainer').innerHTML = `<i data-lucide="arrow-right" id="btnIcon" class="w-5 h-5"></i>`;
            
            // Reset Card UI
            cardText.innerText = "Snap Business Card";
            cardText.classList.remove('text-green-600');
            cardIcon.className = "w-12 h-12 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-lg";
            cardIcon.innerHTML = `<i data-lucide="camera" class="w-6 h-6"></i>`;
            
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
